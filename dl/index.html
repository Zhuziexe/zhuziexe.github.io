<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>空间</title>
    <style>
        /* ----- 全局样式 ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #e6f3ff 0%, #b3d9f5 100%);
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ----- 顶部导航栏 ----- */
        .header {
            position: relative;
            width: 100%;
            max-width: 1200px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 0 30px;
            /* 给返回按钮留出空间 */
        }

        /* 返回按钮 - 左上角 */
        .back-btn {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 30px;
            color: #0a3153;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 12px rgba(43, 127, 199, 0.15);
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 6px 20px rgba(43, 127, 199, 0.25);
            transform: translateY(-50%) scale(1.02);
        }

        .back-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* 标题区域 - 图标 + “作品下载” */
        .title-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .title-icon {
            width: 44px;
            height: 44px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(30, 120, 200, 0.2));
        }

        .page-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: #0a3153;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(255, 255, 255, 0.5);
            margin: 0;
            line-height: 1.2;
        }

        /* ----- 卡片网格 ----- */
        .grid {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-top: 10px;
        }

        /* 卡片 - 固定大小，浅蓝色装饰 */
        .card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 28px;
            overflow: hidden;
            box-shadow:
                0 12px 28px rgba(70, 150, 220, 0.20),
                inset 0 1px 2px rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            /* 固定卡片尺寸 (可根据需要调整) */
            height: 380px;
            /* 宽由网格决定，但限制最小宽度 */
            min-width: 0;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow:
                0 20px 40px rgba(50, 130, 210, 0.30),
                inset 0 1px 2px rgba(255, 255, 255, 0.7);
        }

        /* 图片区域 - 固定高度，图片填满 */
        .card-image {
            width: 100%;
            height: 200px;
            background: #f0f8ff;
            overflow: hidden;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .card:hover .card-image img {
            transform: scale(1.03);
        }

        /* 文字区域 - 固定高度，内边距 */
        .card-body {
            padding: 16px 18px 18px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #0a3153;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .card-desc {
            font-size: 0.95rem;
            color: #2c5778;
            line-height: 1.4;
            opacity: 0.9;
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-link {
            display: block;          /* 让 a 占满整行 */
            text-decoration: none;   /* 去掉下划线 */
            color: inherit;          /* 文字颜色继承，不变成蓝色 */
            /* 卡片的 hover 效果可以移到 .card 上，或者保留 */
        }

        /* ----- 响应式布局 ----- */
        @media (max-width: 992px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
        }

        @media (max-width: 576px) {
            .grid {
                grid-template-columns: 1fr;
                gap: 18px;
            }

            .header {
                padding: 10px 0 20px;
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }

            .back-btn {
                position: static;
                transform: none;
                align-self: flex-start;
                margin-bottom: 6px;
            }

            .back-btn:hover {
                transform: none;
            }

            .page-title {
                font-size: 1.8rem;
            }

            .title-icon {
                width: 36px;
                height: 36px;
            }

            .card {
                height: 340px;
            }

            .card-image {
                height: 170px;
            }
        }

        /* 额外装饰：页面底部柔光 */
        body::after {
            content: '';
            position: fixed;
            bottom: -100px;
            right: -100px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(140, 200, 240, 0.25), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>
    <!-- 顶部：返回按钮 + 标题 -->
    <header class="header">
        <!-- 返回按钮 (回到上级目录 ../) -->
        <a href="../" class="back-btn">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            返回
        </a>

        <!-- 标题：图标 + “作品下载” -->
        <div class="title-wrapper">
            <img class="title-icon" src="../image/zhuzi.png" alt="竹子图标" />
            <h1 class="page-title">空间</h1>
        </div>
    </header>

    <!-- 卡片网格 -->
    <div class="grid">
        <!-- ======================== -->
        <!-- 卡片 1 （示例）          -->
        <!-- 复制此块即可添加新卡片   -->
        <!-- ======================== -->
         <a class="card-link" href="./zhuziwin32/">
            <div class="card">
                <div class="card-image">
                    <img src="../image/zhuziwin32.png" alt="作品封面" />
                </div>
                <div class="card-body">
                    <h3 class="card-title">ZhuziWin32</h3>
                    <p class="card-desc">一个轻量级C++图形界面库</p>
                </div>
            </div>
        </a>
        <a class="card-link" href="./chengzios/">
            <div class="card">
                <div class="card-image">
                    <img src="../image/chengzi.png" alt="作品封面" />
                </div>
                <div class="card-body">
                    <h3 class="card-title">ChengziOS</h3>
                    <p class="card-desc">用Scratch/Turbowarp做的伪系统(点击下载)</p>
                </div>
            </div>
        </a>
        <!-- 后续卡片继续复制此处 -->
        <!-- 例如：
        <div class="card">
            <div class="card-image"><img src="..." alt="..." /></div>
            <div class="card-body"><h3 class="card-title">...</h3><p class="card-desc">...</p></div>
        </div>
        -->
    </div>
</body>
</html>
