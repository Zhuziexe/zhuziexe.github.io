<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>空间</title>
    <link rel="stylesheet" href="./style.css" />
</head>
<body>
    <header class="header">
        <!-- 返回按钮 -->
        <a href="../" class="back-btn">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            返回
        </a>

        <!-- 标题 -->
        <div class="title-wrapper">
            <img class="title-icon" src="../image/zhuzi.png" alt="竹子图标" />
            <h1 class="page-title">空间</h1>
        </div>

        <!-- 主题切换按钮（确保存在） -->
        <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
            <svg viewBox="0 0 24 24" id="themeIcon">
                <path d="M12 3a9 9 0 1 0 9 9 9 9 0 0 0-9-9zm0 16a7 7 0 1 1 7-7 7 7 0 0 1-7 7z"/>
                <path d="M12 5v2M12 17v2M7.05 7.05l1.41 1.41M15.54 15.54l1.41 1.41M5 12h2M17 12h2M7.05 16.95l1.41-1.41M15.54 8.46l1.41-1.41"/>
            </svg>
        </button>
    </header>

    <div class="grid">
        <!-- 卡片 -->
        <a class="card-link" href="./zhuziwin32/">
            <div class="card">
                <div class="card-image">
                    <img src="../image/zhuziwin32.png" alt="作品封面" />
                </div>
                <div class="card-body">
                    <h3 class="card-title">ZhuziWin32</h3>
                    <p class="card-desc">一个轻量级C++图形界面库</p>
                </div>
            </div>
        </a>
        <a class="card-link" href="./chengzios/">
            <div class="card">
                <div class="card-image">
                    <img src="../image/chengzi.png" alt="作品封面" />
                </div>
                <div class="card-body">
                    <h3 class="card-title">ChengziOS</h3>
                    <p class="card-desc">用Scratch/Turbowarp做的伪系统(点击下载)</p>
                </div>
            </div>
        </a>
    </div>

    <!-- 主题切换脚本 -->
    <script>
        (function() {
            const toggleBtn = document.getElementById('themeToggle');
            const icon = document.getElementById('themeIcon');
            const body = document.body;

            const savedTheme = localStorage.getItem('theme-preference');

            function getSystemTheme() {
                return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }

            function applyTheme(theme) {
                body.classList.remove('dark', 'light');
                if (theme === 'dark') {
                    body.classList.add('dark');
                    icon.innerHTML = `
                        <circle cx="12" cy="12" r="5"/>
                        <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <line x1="12" y1="1" x2="12" y2="3"/>
                            <line x1="12" y1="21" x2="12" y2="23"/>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                            <line x1="1" y1="12" x2="3" y2="12"/>
                            <line x1="21" y1="12" x2="23" y2="12"/>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                        </g>
                    `;
                } else {
                    body.classList.add('light');
                    icon.innerHTML = `
                        <path d="M12 3a9 9 0 1 0 9 9 9 9 0 0 0-9-9zm0 16a7 7 0 1 1 7-7 7 7 0 0 1-7 7z"/>
                        <path d="M12 5v2M12 17v2M7.05 7.05l1.41 1.41M15.54 15.54l1.41 1.41M5 12h2M17 12h2M7.05 16.95l1.41-1.41M15.54 8.46l1.41-1.41"/>
                    `;
                }
            }

            function getPreferredTheme() {
                if (savedTheme) return savedTheme;
                return getSystemTheme();
            }

            function toggleTheme() {
                const currentIsDark = body.classList.contains('dark');
                const newTheme = currentIsDark ? 'light' : 'dark';
                localStorage.setItem('theme-preference', newTheme);
                applyTheme(newTheme);
            }

            const systemMedia = window.matchMedia('(prefers-color-scheme: dark)');
            systemMedia.addEventListener('change', function(e) {
                if (!localStorage.getItem('theme-preference')) {
                    applyTheme(e.matches ? 'dark' : 'light');
                }
            });

            applyTheme(getPreferredTheme());
            toggleBtn.addEventListener('click', toggleTheme);
        })();
    </script>
</body>
</html>
