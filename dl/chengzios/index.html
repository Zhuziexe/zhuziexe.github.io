<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChengziOS · 详情</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #e6f3ff 0%, #b3d9f5 100%);
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            padding: 40px 0;               /* 上下留白 */
            display: flex;
            justify-content: center;
        }

        /* ----- 卡片：左右各留 50px，可滚动 ----- */
        .card-container {
            width: calc(100% - 100px);       /* 左右各 50px */
            max-width: 1400px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(50, 130, 210, 0.30);
            border: none;                    /* 彻底移除边框 */
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 30px 40px;
            position: relative;
            margin: 0 auto;
        }

        /* ----- 返回箭头（左上角） ----- */
        .back-arrow {
            position: absolute;
            top: 28px;
            left: 28px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 12px rgba(43, 127, 199, 0.15);
            transition: all 0.2s ease;
            text-decoration: none;
            color: #0a3153;
        }

        .back-arrow:hover {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 6px 20px rgba(43, 127, 199, 0.3);
            transform: scale(1.08);
        }

        .back-arrow svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
            display: block;
        }

        /* ----- 卡片头部 ----- */
        .card-header {
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: relative;
            padding: 8px 0 16px 60px;   /* 为箭头留空间 */
            border-bottom: 2px solid rgba(160, 200, 240, 0.3);
            margin-bottom: 18px;
            overflow: hidden;
        }

        .title-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
            max-width: calc(100% - 150px);   /* 为下载按钮留出足够空间 */
            padding-right: 20px;
        }

        .card-title {
            font-size: clamp(2.4rem, 6vw, 4.2rem);
            font-weight: 700;
            color: #0a3153;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(255, 255, 255, 0.4);
            margin: 0;
            line-height: 1.2;
            word-break: break-word;
        }

        .card-sub {
            font-size: clamp(1rem, 2vw, 1.4rem);
            color: #2c5778;
            opacity: 0.9;
            font-weight: 400;
            margin: 0;
        }

        /* ----- 下载按钮（右上角，不再贴边） ----- */
        .download-btn {
            position: absolute;
            top: 16px;           /* 距顶部 16px，避免阴影被裁剪 */
            right: 16px;         /* 距右侧 16px */
            display: inline-block;
            padding: 12px 32px;
            background: linear-gradient(145deg, #4a9fe0, #2b7fc7);
            color: #fff;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 60px;
            box-shadow: 0 8px 24px rgba(43, 127, 199, 0.35),
                        inset 0 2px 4px rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.25s ease;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .download-btn:hover {
            background: linear-gradient(145deg, #5cb0f0, #2f8ad4);
            box-shadow: 0 12px 32px rgba(43, 127, 199, 0.55);
            transform: scale(1.04) translateY(-2px);
        }

        .download-btn:active {
            transform: scale(0.96);
        }

        /* ----- 图片区域（底部） ----- */
        .card-image-wrapper {
            flex: 1;
            min-height: 200px;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(200, 225, 245, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 4px 12px rgba(50, 130, 210, 0.08);
            margin-top: 10px;
        }

        .card-image-wrapper img {
            width: 100%;
            height: auto;
            max-height: 500px;
            object-fit: contain;
            display: block;
            transition: transform 0.4s ease;
        }

        .card-image-wrapper img:hover {
            transform: scale(1.02);
        }

        /* ===== 响应式适配 ===== */
        @media (max-width: 768px) {
            .card-container {
                padding: 20px 20px 20px 20px;
                border-radius: 28px;
                width: calc(100% - 40px);   /* 左右各 20px */
                border: none;               /* 确保无边框 */
                box-shadow: 0 30px 60px rgba(50, 130, 210, 0.30);
            }

            .back-arrow {
                top: 20px;
                left: 20px;
                width: 38px;
                height: 38px;
            }
            .back-arrow svg {
                width: 20px;
                height: 20px;
            }

            .card-header {
                padding-left: 50px;
                padding-top: 6px;
                padding-bottom: 12px;
            }

            .title-group {
                max-width: calc(100% - 120px);
                padding-right: 10px;
            }

            .download-btn {
                top: 12px;
                right: 12px;
                padding: 8px 18px;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .card-container {
                padding: 14px 14px 12px 14px;
                border-radius: 24px;
                width: calc(100% - 32px);   /* 左右各 16px */
                border: none;
                box-shadow: 0 30px 60px rgba(50, 130, 210, 0.30);
            }

            .back-arrow {
                top: 14px;
                left: 14px;
                width: 34px;
                height: 34px;
            }
            .back-arrow svg {
                width: 18px;
                height: 18px;
            }

            .card-header {
                padding-left: 44px;
                padding-top: 4px;
                padding-bottom: 10px;
            }

            .title-group {
                max-width: calc(100% - 90px);
                padding-right: 6px;
            }

            .download-btn {
                top: 10px;
                right: 10px;
                padding: 6px 14px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

    <div class="card-container">

        <!-- 返回箭头 -->
        <a href="../" class="back-arrow" aria-label="返回">
            <svg viewBox="0 0 24 24">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
        </a>

        <!-- 头部区域 -->
        <div class="card-header">
            <div class="title-group">
                <h1 class="card-title">ChengziOS</h1>
                <p class="card-sub">用 Scratch / Turbowarp 做的伪系统</p>
            </div>
            <a href="https://zhuziexe.github.io/files/ChengziOS0.5.1.sb3"
               class="download-btn"
               target="_blank"
               rel="noopener noreferrer">
                下载
            </a>
        </div>

        <!-- 图片区域 -->
        <div class="card-image-wrapper">
            <img src="../../image/chengzi.png" alt="ChengziOS 预览图" />
        </div>
    </div>

</body>
</html>
