<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>网页走丢了 · 一只无聊的竹子</title>
    <!-- 网站图标 -->
    <link rel="icon" href="https://zhuziexe.github.io/image/zhuzi.png" type="image/png" />
    <!-- 全局主题变量 -->
    <link rel="stylesheet" href="https://zhuziexe.github.io/theme.css" />
    <style>
        /* ===== 404 页面专用样式 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, var(--bg-start), var(--bg-end));
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            padding: 20px;
            transition: background 0.4s ease;
        }

        .error-card {
            max-width: 480px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 50px 40px 45px;
            box-shadow: 0 25px 50px -12px var(--card-shadow),
                        inset 0 2px 4px rgba(255, 255, 255, 0.7),
                        0 0 0 1px var(--card-border);
            border: 1px solid var(--card-border);
            transition: transform 0.25s ease, box-shadow 0.3s ease,
                        background 0.3s ease, border-color 0.3s ease;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .error-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 30px 60px -15px var(--card-shadow-hover),
                        inset 0 2px 4px rgba(255, 255, 255, 0.7),
                        0 0 0 1px var(--card-border);
        }

        /* 装饰光晕（深色模式下会自动变深） */
        .glow {
            position: absolute;
            top: -60%;
            left: -30%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(160, 210, 255, 0.15), transparent 70%);
            pointer-events: none;
            z-index: 0;
            transition: background 0.4s ease;
        }

        /* 深色模式下光晕加深 */
        @media (prefers-color-scheme: dark) {
            .glow {
                background: radial-gradient(circle at 30% 30%, rgba(60, 140, 220, 0.25), transparent 70%);
            }
        }
        body.dark .glow {
            background: radial-gradient(circle at 30% 30%, rgba(60, 140, 220, 0.25), transparent 70%);
        }

        /* 四角装饰圆点（浅色模式） */
        .error-card::before,
        .error-card::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            opacity: 0.4;
            pointer-events: none;
            z-index: -1;
            transition: background 0.4s ease, opacity 0.4s ease;
        }

        .error-card::before {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #8ec6f0, transparent 70%);
            top: -30px;
            right: -20px;
        }

        .error-card::after {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #b3d9f5, transparent 70%);
            bottom: -25px;
            left: -20px;
        }

        /* 深色模式下装饰圆点加深 */
        @media (prefers-color-scheme: dark) {
            .error-card::before {
                background: radial-gradient(circle, #2a5a8a, transparent 70%);
                opacity: 0.5;
            }
            .error-card::after {
                background: radial-gradient(circle, #1a4a7a, transparent 70%);
                opacity: 0.5;
            }
        }
        body.dark .error-card::before {
            background: radial-gradient(circle, #2a5a8a, transparent 70%);
            opacity: 0.5;
        }
        body.dark .error-card::after {
            background: radial-gradient(circle, #1a4a7a, transparent 70%);
            opacity: 0.5;
        }

        /* ===== 内容区域 ===== */
        .content {
            position: relative;
            z-index: 1;
        }

        /* 大号 404 图标 */
        .error-icon {
            font-size: 5rem;
            line-height: 1;
            margin-bottom: 16px;
            display: block;
            filter: drop-shadow(0 4px 12px rgba(30, 120, 200, 0.2));
        }

        /* 主标题 */
        .error-title {
            font-size: 2.4rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(255, 255, 255, 0.6);
            margin-bottom: 12px;
            transition: color 0.3s ease;
        }

        /* 副标题 */
        .error-desc {
            font-size: 1.1rem;
            color: var(--text-secondary);
            opacity: 0.85;
            margin-bottom: 30px;
            transition: color 0.3s ease;
        }

        /* 返回主页按钮 */
        .btn-home {
            display: inline-block;
            padding: 14px 48px;
            background: var(--btn-bg);
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 60px;
            box-shadow: 0 8px 24px var(--btn-shadow),
                        inset 0 2px 4px rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.25s ease;
            letter-spacing: 0.6px;
        }

        .btn-home:hover {
            box-shadow: 0 12px 32px var(--btn-shadow-hover),
                        inset 0 2px 4px rgba(255, 255, 255, 0.4);
            transform: scale(1.03) translateY(-2px);
        }

        .btn-home:active {
            transform: scale(0.97);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 480px) {
            .error-card {
                padding: 36px 24px 32px;
                border-radius: 30px;
            }
            .error-icon {
                font-size: 3.8rem;
            }
            .error-title {
                font-size: 1.8rem;
            }
            .error-desc {
                font-size: 1rem;
            }
            .btn-home {
                padding: 12px 36px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="glow"></div>

        <div class="content">
            <!-- 404 图标 -->
            <span class="error-icon">🔍</span>

            <!-- 主标题 -->
            <h1 class="error-title">网页走丢了</h1>

            <!-- 副标题 -->
            <p class="error-desc">哎呀，这个页面好像迷路了……<br />回到首页看看吧 👇</p>

            <!-- 返回主页按钮 -->
            <a href="https://zhuziexe.github.io/" class="btn-home">回到主页</a>
        </div>
    </div>

    <!-- 主题切换脚本（自动跟随系统 + localStorage 记忆） -->
    <script src="https://zhuziexe.github.io/theme.js"></script>
</body>
</html>
