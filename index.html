<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>一只无聊的竹子</title>
    <link rel="stylesheet" href="./theme.css" />
    <link rel="icon" href="./image/zhuzi.png" type="image/png" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            /* [优化] 安全区域适配 – 防止刘海屏遮挡 */
            padding: max(20px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right))
                     max(20px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
            position: relative;
            overflow: hidden;
            background: linear-gradient(145deg, var(--bg-start), var(--bg-end));
            transition: background 0.4s ease;
        }

        .card {
            max-width: 480px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            /* [优化] 内边距弹性化 – 小屏更紧凑，大屏更舒展 */
            padding: clamp(1.5rem, 5vw, 2.5rem) clamp(1.2rem, 4vw, 2.2rem) clamp(1.8rem, 5vw, 2.8rem);
            box-shadow: 0 25px 50px -12px var(--card-shadow),
                        inset 0 2px 4px rgba(255, 255, 255, 0.7),
                        0 0 0 1px var(--card-border);
            border: 1px solid var(--card-border);
            transition: transform 0.25s ease, box-shadow 0.3s ease,
                        background 0.3s ease, border-color 0.3s ease;
            text-align: center;
            position: relative;
            z-index: 10;
            overflow: hidden;
            animation: cardFloat 3s ease-in-out infinite alternate;
        }

        .card:hover {
            animation-play-state: paused;
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 30px 60px -15px var(--card-shadow-hover),
                        inset 0 2px 4px rgba(255, 255, 255, 0.7),
                        0 0 0 1px var(--card-border);
        }

        @keyframes cardFloat {
            0%   { transform: translateY(0px); }
            100% { transform: translateY(-12px); }
        }

        /* ★ 呼吸光晕 —— 更明显 ★ */
        .glow {
            position: absolute;
            top: -60%;
            left: -30%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, var(--glow-color), transparent 70%);
            pointer-events: none;
            z-index: 0;
            transition: background 0.4s ease;
            animation: glowBreathe 4s ease-in-out infinite alternate;
        }

        :root {
            --glow-color: rgba(160, 210, 255, 0.30);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --glow-color: rgba(60, 140, 220, 0.45);
            }
        }
        body.dark {
            --glow-color: rgba(60, 140, 220, 0.45);
        }
        body.light {
            --glow-color: rgba(160, 210, 255, 0.30);
        }

        @keyframes glowBreathe {
            0%   { transform: scale(1); opacity: 0.4; }
            100% { transform: scale(1.3); opacity: 0.9; }
        }

        /* 装饰圆点（保留） */
        .card::before,
        .card::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            opacity: 0.5;
            pointer-events: none;
            z-index: 0;
            transition: background 0.4s ease, opacity 0.4s ease;
        }
        .card::before {
            width: 160px;
            height: 160px;
            background: radial-gradient(circle, var(--dot1-color), transparent 70%);
            top: -40px;
            right: -30px;
            animation: dotFloat1 8s ease-in-out infinite alternate;
        }
        .card::after {
            width: 140px;
            height: 140px;
            background: radial-gradient(circle, var(--dot2-color), transparent 70%);
            bottom: -30px;
            left: -30px;
            animation: dotFloat2 9s ease-in-out infinite alternate-reverse;
        }

        :root {
            --dot1-color: #8ec6f0;
            --dot2-color: #b3d9f5;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --dot1-color: #2a5a8a;
                --dot2-color: #1a4a7a;
            }
        }
        body.dark {
            --dot1-color: #2a5a8a;
            --dot2-color: #1a4a7a;
        }
        body.light {
            --dot1-color: #8ec6f0;
            --dot2-color: #b3d9f5;
        }

        @keyframes dotFloat1 {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-25px, 18px) scale(1.2); }
        }
        @keyframes dotFloat2 {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(25px, -18px) scale(1.15); }
        }

        .title-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 32px;
            position: relative;
            z-index: 2;
            padding-right: 48px;
        }

        .title-icon {
            width: 48px;
            height: 48px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(30, 120, 200, 0.25));
            flex-shrink: 0;
        }

        .card-title {
            /* [优化] 字号弹性化 – 小屏缩小，大屏放大 */
            font-size: clamp(1.8rem, 6vw, 2.4rem);
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(255, 255, 255, 0.6);
            margin: 0;
            line-height: 1.2;
            transition: color 0.3s ease;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            position: relative;
            z-index: 2;
        }

        .btn {
            display: block;
            /* [优化] 宽度自适应 – 小屏占满更多，大屏固定最大值 */
            width: min(80%, 260px);
            padding: 14px 0;
            background: var(--btn-bg);
            color: #fff;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 60px;
            box-shadow: 0 8px 24px var(--btn-shadow), inset 0 2px 4px rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.25s ease;
            letter-spacing: 0.8px;
            cursor: pointer;
            text-align: center;
            /* [优化] 触摸优化 – 消除点击延迟 */
            touch-action: manipulation;
        }

        /* [优化] 只有支持悬停的设备才启用 hover 效果 */
        @media (hover: hover) {
            .btn:hover {
                box-shadow: 0 12px 32px var(--btn-shadow-hover), inset 0 2px 4px rgba(255, 255, 255, 0.4);
                transform: scale(1.02) translateY(-2px);
            }
            .b-btn:hover {
                background: linear-gradient(145deg, #6ea8e0, #4685cc);
                box-shadow: 0 10px 28px rgba(58, 125, 194, 0.5), inset 0 2px 4px rgba(255, 255, 255, 0.3);
                transform: scale(1.02) translateY(-2px);
            }
            .theme-toggle:hover {
                background: var(--toggle-hover);
                transform: scale(1.08);
            }
        }

        .btn:active {
            transform: scale(0.97);
        }

        .b-btn {
            display: block;
            /* [优化] 宽度自适应 */
            width: min(80%, 220px);
            padding: 12px 0;
            background: linear-gradient(145deg, #5b9bd5, #3a7dc2);
            color: #fff;
            font-size: 1.05rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 60px;
            box-shadow: 0 6px 20px rgba(58, 125, 194, 0.35), inset 0 2px 4px rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: all 0.25s ease;
            letter-spacing: 0.6px;
            cursor: pointer;
            text-align: center;
            /* [优化] 触摸优化 */
            touch-action: manipulation;
        }

        .b-btn:active {
            transform: scale(0.97);
        }

        .theme-toggle {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--back-btn-bg);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid var(--back-btn-border);
            box-shadow: 0 4px 12px rgba(43, 127, 199, 0.15);
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-primary);
            /* [优化] 触摸优化 */
            touch-action: manipulation;
        }

        .theme-toggle svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* ===== 基础移动端适配 ===== */
        @media (max-width: 480px) {
            .card {
                border-radius: 30px;
                /* 内边距已使用 clamp，此处不再覆盖 */
            }
            .title-wrapper {
                gap: 10px;
                margin-bottom: 28px;
                padding-right: 40px;
            }
            .title-icon {
                width: 40px;
                height: 40px;
            }
            /* 标题字号已使用 clamp，此处不再覆盖 */
            .btn {
                font-size: 1rem;
                padding: 12px 0;
            }
            .b-btn {
                font-size: 0.95rem;
                padding: 10px 0;
            }
            .theme-toggle {
                top: 18px;
                right: 18px;
                width: 38px;
                height: 38px;
            }
            .theme-toggle svg {
                width: 20px;
                height: 20px;
            }
        }

        /* [优化] 更小屏设备（如 iPhone SE）的额外收窄 */
        @media (max-width: 400px) {
            .card {
                border-radius: 24px;
            }
            .title-wrapper {
                gap: 8px;
                padding-right: 32px;
            }
            .title-icon {
                width: 32px;
                height: 32px;
            }
            .btn {
                font-size: 0.9rem;
                padding: 10px 0;
                width: min(85%, 200px);
            }
            .b-btn {
                font-size: 0.85rem;
                padding: 8px 0;
                width: min(85%, 180px);
            }
            .theme-toggle {
                top: 14px;
                right: 14px;
                width: 34px;
                height: 34px;
            }
            .theme-toggle svg {
                width: 18px;
                height: 18px;
            }
        }
    </style>
</head>
<body>
    <!-- 主体内容保持不变 -->
    <div class="card" id="card">
        <div class="glow"></div>
        <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
            <svg viewBox="0 0 24 24" id="themeIcon">
                <path d="M12 3a9 9 0 1 0 9 9 9 9 0 0 0-9-9zm0 16a7 7 0 1 1 7-7 7 7 0 0 1-7 7z"/>
                <path d="M12 5v2M12 17v2M7.05 7.05l1.41 1.41M15.54 15.54l1.41 1.41M5 12h2M17 12h2M7.05 16.95l1.41-1.41M15.54 8.46l1.41-1.41"/>
            </svg>
        </button>
        <div class="title-wrapper">
            <img class="title-icon" src="./image/zhuzi.png" alt="竹子图标" />
            <h1 class="card-title">一只无聊的竹子</h1>
        </div>
        <div class="btn-group">
            <a href="./dl/" class="btn">进入空间</a>
            <a href="https://space.bilibili.com/3707020345608714" target="_blank" rel="noopener noreferrer" class="b-btn">B站主页</a>
        </div>
    </div>
    <script src="./theme.js"></script>
</body>
</html>
