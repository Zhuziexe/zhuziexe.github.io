<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>一只无聊的竹子</title>
    <link rel="stylesheet" href="./theme.css" />
    <style>
        /* ===== 基础重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            padding: 20px;
            transition: background 0.4s ease;
            position: relative;
            overflow: hidden;
            /* ★ 背景渐变动画（默认浅色模式） ★ */
            animation: bgGradientLight 8s ease-in-out infinite alternate;
            background-size: 200% 200%;
        }

        /* ===== 浅色模式背景动画 ===== */
        @keyframes bgGradientLight {
            0%   { background: linear-gradient(145deg, #e6f3ff, #b3d9f5); }
            25%  { background: linear-gradient(145deg, #cce0ff, #99ccff); }
            50%  { background: linear-gradient(145deg, #b3d9f5, #80bfff); }
            75%  { background: linear-gradient(145deg, #99ccff, #66b3ff); }
            100% { background: linear-gradient(145deg, #e6f3ff, #b3d9f5); }
        }

        /* ===== 深色模式背景动画（覆盖） ===== */
        @media (prefers-color-scheme: dark) {
            body {
                animation-name: bgGradientDark;
            }
        }
        body.dark {
            animation-name: bgGradientDark;
        }
        /* 手动浅色模式覆盖 */
        body.light {
            animation-name: bgGradientLight;
        }

        @keyframes bgGradientDark {
            0%   { background: linear-gradient(145deg, #1a3050, #102040); }
            25%  { background: linear-gradient(145deg, #1a3a5a, #183050); }
            50%  { background: linear-gradient(145deg, #20486a, #1a3050); }
            75%  { background: linear-gradient(145deg, #183a5a, #20486a); }
            100% { background: linear-gradient(145deg, #1a3050, #102040); }
        }

        /* ===== 卡片容器 ===== */
        .card {
            max-width: 480px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 40px 35px 45px;
            box-shadow: 0 25px 50px -12px var(--card-shadow),
                        inset 0 2px 4px rgba(255, 255, 255, 0.7),
                        0 0 0 1px var(--card-border);
            border: 1px solid var(--card-border);
            transition: transform 0.25s ease, box-shadow 0.3s ease,
                        background 0.3s ease, border-color 0.3s ease;
            text-align: center;
            position: relative;
            z-index: 10;
            overflow: hidden;
            /* 卡片浮动 */
            animation: cardFloat 6s ease-in-out infinite alternate;
        }

        .card:hover {
            animation-play-state: paused;
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 30px 60px -15px var(--card-shadow-hover),
                        inset 0 2px 4px rgba(255, 255, 255, 0.7),
                        0 0 0 1px var(--card-border);
        }

        @keyframes cardFloat {
            0%   { transform: translateY(0px); }
            100% { transform: translateY(-12px); }
        }

        /* ===== 卡片内部光晕（呼吸） ===== */
        .glow {
            position: absolute;
            top: -60%;
            left: -30%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, var(--glow-color), transparent 70%);
            pointer-events: none;
            z-index: 0;
            transition: background 0.4s ease;
            animation: glowBreathe 5s ease-in-out infinite alternate;
        }

        :root {
            --glow-color: rgba(160, 210, 255, 0.20);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --glow-color: rgba(60, 140, 220, 0.30);
            }
        }
        body.dark {
            --glow-color: rgba(60, 140, 220, 0.30);
        }
        body.light {
            --glow-color: rgba(160, 210, 255, 0.20);
        }

        @keyframes glowBreathe {
            0%   { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        /* ===== ★ 鼠标跟随光晕（位于卡片上方） ★ ===== */
        .glow-follow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;          /* 在内容之下（内容 z-index 2） */
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), var(--follow-color), transparent 70%);
            opacity: 0.4;
            transition: background 0.3s ease;
            border-radius: 40px;  /* 与卡片圆角一致 */
        }

        :root {
            --follow-color: rgba(140, 200, 255, 0.25);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --follow-color: rgba(60, 140, 220, 0.35);
            }
        }
        body.dark {
            --follow-color: rgba(60, 140, 220, 0.35);
        }
        body.light {
            --follow-color: rgba(140, 200, 255, 0.25);
        }

        /* ===== 装饰圆点（浮动） ===== */
        .card::before,
        .card::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            opacity: 0.5;
            pointer-events: none;
            z-index: 0;
            transition: background 0.4s ease, opacity 0.4s ease;
        }

        .card::before {
            width: 160px;
            height: 160px;
            background: radial-gradient(circle, var(--dot1-color), transparent 70%);
            top: -40px;
            right: -30px;
            animation: dotFloat1 8s ease-in-out infinite alternate;
        }
        .card::after {
            width: 140px;
            height: 140px;
            background: radial-gradient(circle, var(--dot2-color), transparent 70%);
            bottom: -30px;
            left: -30px;
            animation: dotFloat2 9s ease-in-out infinite alternate-reverse;
        }

        :root {
            --dot1-color: #8ec6f0;
            --dot2-color: #b3d9f5;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --dot1-color: #2a5a8a;
                --dot2-color: #1a4a7a;
            }
        }
        body.dark {
            --dot1-color: #2a5a8a;
            --dot2-color: #1a4a7a;
        }
        body.light {
            --dot1-color: #8ec6f0;
            --dot2-color: #b3d9f5;
        }

        @keyframes dotFloat1 {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-25px, 18px) scale(1.2); }
        }
        @keyframes dotFloat2 {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(25px, -18px) scale(1.15); }
        }

        /* ===== 内容区域 ===== */
        .title-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 32px;
            position: relative;
            z-index: 2;      /* 在光晕之上 */
            padding-right: 48px;
        }

        .title-icon {
            width: 48px;
            height: 48px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(30, 120, 200, 0.25));
            flex-shrink: 0;
        }

        .card-title {
            font-size: 2.4rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(255, 255, 255, 0.6);
            margin: 0;
            line-height: 1.2;
            transition: color 0.3s ease;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            position: relative;
            z-index: 2;
        }

        .btn {
            display: block;
            width: 260px;
            padding: 14px 0;
            background: var(--btn-bg);
            color: #fff;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 60px;
            box-shadow: 0 8px 24px var(--btn-shadow), inset 0 2px 4px rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.25s ease;
            letter-spacing: 0.8px;
            cursor: pointer;
            text-align: center;
        }

        .btn:hover {
            box-shadow: 0 12px 32px var(--btn-shadow-hover), inset 0 2px 4px rgba(255, 255, 255, 0.4);
            transform: scale(1.02) translateY(-2px);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .b-btn {
            display: block;
            width: 220px;
            padding: 12px 0;
            background: linear-gradient(145deg, #5b9bd5, #3a7dc2);
            color: #fff;
            font-size: 1.05rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 60px;
            box-shadow: 0 6px 20px rgba(58, 125, 194, 0.35), inset 0 2px 4px rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: all 0.25s ease;
            letter-spacing: 0.6px;
            cursor: pointer;
            text-align: center;
        }

        .b-btn:hover {
            background: linear-gradient(145deg, #6ea8e0, #4685cc);
            box-shadow: 0 10px 28px rgba(58, 125, 194, 0.5), inset 0 2px 4px rgba(255, 255, 255, 0.3);
            transform: scale(1.02) translateY(-2px);
        }
        .b-btn:active {
            transform: scale(0.97);
        }

        /* 主题切换按钮 */
        .theme-toggle {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--back-btn-bg);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid var(--back-btn-border);
            box-shadow: 0 4px 12px rgba(43, 127, 199, 0.15);
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-primary);
        }

        .theme-toggle:hover {
            background: var(--toggle-hover);
            transform: scale(1.08);
        }

        .theme-toggle svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 480px) {
            .card { padding: 30px 20px 35px; border-radius: 30px; }
            .title-wrapper { gap: 10px; margin-bottom: 28px; padding-right: 40px; }
            .title-icon { width: 40px; height: 40px; }
            .card-title { font-size: 2rem; }
            .btn { width: 220px; font-size: 1rem; padding: 12px 0; }
            .b-btn { width: 190px; font-size: 0.95rem; padding: 10px 0; }
            .theme-toggle { top: 18px; right: 18px; width: 38px; height: 38px; }
            .theme-toggle svg { width: 20px; height: 20px; }
        }
    </style>
</head>
<body>

    <!-- 卡片 -->
    <div class="card" id="card">

        <!-- 内部光晕（呼吸） -->
        <div class="glow"></div>

        <!-- ★ 鼠标跟随光晕（位于卡片上方） ★ -->
        <div class="glow-follow" id="glowFollow"></div>

        <!-- 主题切换按钮 -->
        <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
            <svg viewBox="0 0 24 24" id="themeIcon">
                <path d="M12 3a9 9 0 1 0 9 9 9 9 0 0 0-9-9zm0 16a7 7 0 1 1 7-7 7 7 0 0 1-7 7z"/>
                <path d="M12 5v2M12 17v2M7.05 7.05l1.41 1.41M15.54 15.54l1.41 1.41M5 12h2M17 12h2M7.05 16.95l1.41-1.41M15.54 8.46l1.41-1.41"/>
            </svg>
        </button>

        <!-- 标题区 -->
        <div class="title-wrapper">
            <img class="title-icon" src="./image/zhuzi.png" alt="竹子图标" />
            <h1 class="card-title">一只无聊的竹子</h1>
        </div>

        <!-- 按钮组 -->
        <div class="btn-group">
            <a href="./dl/" class="btn">进入空间</a>
            <a href="https://space.bilibili.com/3707020345608714" target="_blank" rel="noopener noreferrer" class="b-btn">B站主页</a>
        </div>
    </div>

    <script src="./theme.js"></script>
    <script>
        // ★ 鼠标跟随光晕逻辑 ★
        (function() {
            const card = document.getElementById('card');
            const glow = document.getElementById('glowFollow');

            if (!card || !glow) return;

            function updateGlow(e) {
                const rect = card.getBoundingClientRect();
                // 计算鼠标相对于卡片的位置（百分比）
                let x = ((e.clientX - rect.left) / rect.width) * 100;
                let y = ((e.clientY - rect.top) / rect.height) * 100;
                // 限制在 0~100 之间，避免光晕中心跑出卡片
                x = Math.min(100, Math.max(0, x));
                y = Math.min(100, Math.max(0, y));
                glow.style.setProperty('--x', x + '%');
                glow.style.setProperty('--y', y + '%');
            }

            // 监听鼠标移动
            document.addEventListener('mousemove', updateGlow);

            // 如果鼠标离开窗口，让光晕回到中心（可选）
            // 可添加 mouseleave 事件，但为了简单，不做额外处理
        })();
    </script>

</body>
</html>
