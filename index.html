
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>竹子 · 主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #e6f3ff 0%, #b3d9f5 100%);
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        .card {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 40px 35px 45px;
            box-shadow:
                0 25px 50px -12px rgba(70, 150, 220, 0.35),
                inset 0 2px 4px rgba(255, 255, 255, 0.7),
                0 0 0 1px rgba(180, 215, 245, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow:
                0 30px 60px -15px rgba(50, 130, 210, 0.45),
                inset 0 2px 4px rgba(255, 255, 255, 0.7),
                0 0 0 1px rgba(160, 200, 240, 0.6);
        }

        /* 装饰光晕 */
        .card .glow {
            position: absolute;
            top: -60%;
            left: -30%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(160, 210, 255, 0.15), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .card::before,
        .card::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            opacity: 0.4;
            pointer-events: none;
            z-index: -1;
        }

        .card::before {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #8ec6f0, transparent 70%);
            top: -30px;
            right: -20px;
        }

        .card::after {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #b3d9f5, transparent 70%);
            bottom: -25px;
            left: -20px;
        }

        /* 标题区域 */
        .title-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 32px;
            position: relative;
            z-index: 1;
        }

        .title-icon {
            width: 48px;
            height: 48px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(30, 120, 200, 0.25));
            flex-shrink: 0;
        }

        .card-title {
            font-size: 2.4rem;
            font-weight: 700;
            color: #0a3153;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(255, 255, 255, 0.6);
            margin: 0;
            line-height: 1.2;
        }

        /* ===== 按钮容器（垂直排列） ===== */
        .button-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            position: relative;
            z-index: 1;
        }

        /* ----- 进入空间按钮（固定宽度） ----- */
        .btn {
            display: block;
            width: 260px;                /* 固定宽度，方便扩展 */
            padding: 14px 0;
            background: linear-gradient(145deg, #4a9fe0, #2b7fc7);
            color: #fff;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 60px;
            box-shadow:
                0 8px 24px rgba(43, 127, 199, 0.4),
                inset 0 2px 4px rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.25s ease;
            letter-spacing: 0.8px;
            cursor: pointer;
            text-align: center;
        }

        .btn:hover {
            background: linear-gradient(145deg, #5cb0f0, #2f8ad4);
            box-shadow:
                0 12px 32px rgba(43, 127, 199, 0.55),
                inset 0 2px 4px rgba(255, 255, 255, 0.4);
            transform: scale(1.02) translateY(-2px);
        }

        .btn:active {
            transform: scale(0.97);
            box-shadow: 0 4px 12px rgba(43, 127, 199, 0.3);
        }

        /* ----- B站主页按钮（不同宽度，蓝色调） ----- */
        .b-btn {
            display: block;
            width: 220px;                /* 与 .btn 宽度不同 */
            padding: 12px 0;
            background: linear-gradient(145deg, #5b9bd5, #3a7dc2);  /* 稍浅的蓝，美观 */
            color: #fff;
            font-size: 1.05rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 60px;
            box-shadow:
                0 6px 20px rgba(58, 125, 194, 0.35),
                inset 0 2px 4px rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: all 0.25s ease;
            letter-spacing: 0.6px;
            cursor: pointer;
            text-align: center;
        }

        .b-btn:hover {
            background: linear-gradient(145deg, #6ea8e0, #4685cc);
            box-shadow:
                0 10px 28px rgba(58, 125, 194, 0.5),
                inset 0 2px 4px rgba(255, 255, 255, 0.3);
            transform: scale(1.02) translateY(-2px);
        }

        .b-btn:active {
            transform: scale(0.97);
            box-shadow: 0 4px 12px rgba(58, 125, 194, 0.3);
        }

        /* 响应式调整 */
        @media (max-width: 480px) {
            .card {
                padding: 30px 20px 35px;
                border-radius: 30px;
            }

            .title-wrapper {
                gap: 10px;
                margin-bottom: 28px;
            }

            .title-icon {
                width: 40px;
                height: 40px;
            }

            .card-title {
                font-size: 2rem;
            }

            .btn {
                width: 220px;            /* 小屏适当缩小 */
                font-size: 1rem;
                padding: 12px 0;
            }

            .b-btn {
                width: 190px;
                font-size: 0.95rem;
                padding: 10px 0;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- 装饰光晕 -->
        <div class="glow"></div>

        <!-- 标题区 -->
        <div class="title-wrapper">
            <img class="title-icon" src="./image/zhuzi.png" alt="竹子图标" />
            <h1 class="card-title">一只无聊的竹子</h1>
        </div>

        <!-- 按钮组 -->
        <div class="button-group">
            <!-- 进入空间按钮（固定宽度） -->
            <a href="./dl/" class="btn">进入空间</a>
            <!-- B站主页按钮（不同宽度，放在最下面） -->
            <a href="https://space.bilibili.com/3707020345608714"
               target="_blank"
               rel="noopener noreferrer"
               class="b-btn">B站主页</a>
        </div>
    </div>
</body>
</html>
