<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>一只无聊的竹子</title>
    <link rel="stylesheet" href="./theme.css" />
    <style>
        /* ===== 主页专用样式 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            padding: 20px;
            transition: background 0.4s ease;
            position: relative;
            overflow: hidden;
            /* 纯色渐变背景（无波浪） */
            background: linear-gradient(145deg, var(--bg-start), var(--bg-end));
        }

        /* ===== 背景光晕球（两个，缓慢移动） ===== */
        .orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(60px);
            transition: background 0.4s ease;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--orb1-color), transparent 70%);
            animation: orbFloat1 18s ease-in-out infinite alternate;
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--orb2-color), transparent 70%);
            animation: orbFloat2 22s ease-in-out infinite alternate-reverse;
            bottom: -100px;
            right: -100px;
        }

        /* 浅色模式光晕颜色 */
        :root {
            --orb1-color: rgba(140, 200, 240, 0.25);
            --orb2-color: rgba(180, 215, 245, 0.20);
        }

        /* 深色模式光晕颜色（更明显） */
        @media (prefers-color-scheme: dark) {
            :root {
                --orb1-color: rgba(60, 140, 220, 0.30);
                --orb2-color: rgba(40, 120, 200, 0.25);
            }
        }
        body.dark {
            --orb1-color: rgba(60, 140, 220, 0.30);
            --orb2-color: rgba(40, 120, 200, 0.25);
        }
        body.light {
            --orb1-color: rgba(140, 200, 240, 0.25);
            --orb2-color: rgba(180, 215, 245, 0.20);
        }

        @keyframes orbFloat1 {
            0%   { transform: translate(0, 0) scale(1); }
            25%  { transform: translate(30vw, 10vh) scale(1.1); }
            50%  { transform: translate(60vw, 40vh) scale(0.9); }
            75%  { transform: translate(20vw, 70vh) scale(1.15); }
            100% { transform: translate(0, 0) scale(1); }
        }

        @keyframes orbFloat2 {
            0%   { transform: translate(0, 0) scale(1); }
            33%  { transform: translate(-20vw, 30vh) scale(1.2); }
            66%  { transform: translate(-40vw, 60vh) scale(0.85); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* ===== 卡片：自身浮动 ===== */
        .card {
            max-width: 480px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 40px 35px 45px;
            box-shadow: 0 25px 50px -12px var(--card-shadow), inset 0 2px 4px rgba(255, 255, 255, 0.7), 0 0 0 1px var(--card-border);
            border: 1px solid var(--card-border);
            transition: transform 0.25s ease, box-shadow 0.3s ease, background 0.3s ease, border-color 0.3s ease;
            text-align: center;
            position: relative;
            z-index: 10;
            overflow: hidden;
            /* ★ 卡片上下浮动 ★ */
            animation: cardFloat 6s ease-in-out infinite alternate;
        }

        @keyframes cardFloat {
            0%   { transform: translateY(0px); }
            100% { transform: translateY(-12px); }
        }

        .card:hover {
            /* 悬停时覆盖浮动，以保持交互反馈 */
            animation-play-state: paused;
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 30px 60px -15px var(--card-shadow-hover), inset 0 2px 4px rgba(255, 255, 255, 0.7), 0 0 0 1px var(--card-border);
        }

        /* 卡片内部光晕（呼吸） */
        .glow {
            position: absolute;
            top: -60%;
            left: -30%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, var(--glow-color), transparent 70%);
            pointer-events: none;
            z-index: 0;
            transition: background 0.4s ease;
            animation: glowBreathe 5s ease-in-out infinite alternate;
        }

        :root {
            --glow-color: rgba(160, 210, 255, 0.20);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --glow-color: rgba(60, 140, 220, 0.30);
            }
        }
        body.dark {
            --glow-color: rgba(60, 140, 220, 0.30);
        }
        body.light {
            --glow-color: rgba(160, 210, 255, 0.20);
        }

        @keyframes glowBreathe {
            0%   { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        /* 装饰圆点（也浮动） */
        .card::before,
        .card::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            opacity: 0.5;
            pointer-events: none;
            z-index: -1;
            transition: background 0.4s ease, opacity 0.4s ease;
        }

        .card::before {
            width: 160px;
            height: 160px;
            background: radial-gradient(circle, var(--dot1-color), transparent 70%);
            top: -40px;
            right: -30px;
            animation: dotFloat1 8s ease-in-out infinite alternate;
        }
        .card::after {
            width: 140px;
            height: 140px;
            background: radial-gradient(circle, var(--dot2-color), transparent 70%);
            bottom: -30px;
            left: -30px;
            animation: dotFloat2 9s ease-in-out infinite alternate-reverse;
        }

        :root {
            --dot1-color: #8ec6f0;
            --dot2-color: #b3d9f5;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --dot1-color: #2a5a8a;
                --dot2-color: #1a4a7a;
            }
        }
        body.dark {
            --dot1-color: #2a5a8a;
            --dot2-color: #1a4a7a;
        }
        body.light {
            --dot1-color: #8ec6f0;
            --dot2-color: #b3d9f5;
        }

        @keyframes dotFloat1 {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-25px, 18px) scale(1.2); }
        }
        @keyframes dotFloat2 {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(25px, -18px) scale(1.15); }
        }

        .title-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 32px;
            position: relative;
            z-index: 1;
            padding-right: 48px;
        }

        .title-icon {
            width: 48px;
            height: 48px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(30, 120, 200, 0.25));
            flex-shrink: 0;
        }

        .card-title {
            font-size: 2.4rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(255, 255, 255, 0.6);
            margin: 0;
            line-height: 1.2;
            transition: color 0.3s ease;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            position: relative;
            z-index: 1;
        }

        .btn {
            display: block;
            width: 260px;
            padding: 14px 0;
            background: var(--btn-bg);
            color: #fff;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 60px;
            box-shadow: 0 8px 24px var(--btn-shadow), inset 0 2px 4px rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.25s ease;
            letter-spacing: 0.8px;
            cursor: pointer;
            text-align: center;
        }

        .btn:hover {
            box-shadow: 0 12px 32px var(--btn-shadow-hover), inset 0 2px 4px rgba(255, 255, 255, 0.4);
            transform: scale(1.02) translateY(-2px);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .b-btn {
            display: block;
            width: 220px;
            padding: 12px 0;
            background: linear-gradient(145deg, #5b9bd5, #3a7dc2);
            color: #fff;
            font-size: 1.05rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 60px;
            box-shadow: 0 6px 20px rgba(58, 125, 194, 0.35), inset 0 2px 4px rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: all 0.25s ease;
            letter-spacing: 0.6px;
            cursor: pointer;
            text-align: center;
        }

        .b-btn:hover {
            background: linear-gradient(145deg, #6ea8e0, #4685cc);
            box-shadow: 0 10px 28px rgba(58, 125, 194, 0.5), inset 0 2px 4px rgba(255, 255, 255, 0.3);
            transform: scale(1.02) translateY(-2px);
        }
        .b-btn:active {
            transform: scale(0.97);
        }

        .theme-toggle {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--back-btn-bg);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid var(--back-btn-border);
            box-shadow: 0 4px 12px rgba(43, 127, 199, 0.15);
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-primary);
        }

        .theme-toggle:hover {
            background: var(--toggle-hover);
            transform: scale(1.08);
        }

        .theme-toggle svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        @media (max-width: 480px) {
            .card { padding: 30px 20px 35px; border-radius: 30px; }
            .title-wrapper { gap: 10px; margin-bottom: 28px; padding-right: 40px; }
            .title-icon { width: 40px; height: 40px; }
            .card-title { font-size: 2rem; }
            .btn { width: 220px; font-size: 1rem; padding: 12px 0; }
            .b-btn { width: 190px; font-size: 0.95rem; padding: 10px 0; }
            .theme-toggle { top: 18px; right: 18px; width: 38px; height: 38px; }
            .theme-toggle svg { width: 20px; height: 20px; }
            .orb-1 { width: 300px; height: 300px; filter: blur(40px); }
            .orb-2 { width: 250px; height: 250px; filter: blur(40px); }
        }
    </style>
</head>
<body>

    <!-- 背景光晕球 -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- 卡片 -->
    <div class="card">
        <div class="glow"></div>

        <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
            <svg viewBox="0 0 24 24" id="themeIcon">
                <path d="M12 3a9 9 0 1 0 9 9 9 9 0 0 0-9-9zm0 16a7 7 0 1 1 7-7 7 7 0 0 1-7 7z"/>
                <path d="M12 5v2M12 17v2M7.05 7.05l1.41 1.41M15.54 15.54l1.41 1.41M5 12h2M17 12h2M7.05 16.95l1.41-1.41M15.54 8.46l1.41-1.41"/>
            </svg>
        </button>

        <div class="title-wrapper">
            <img class="title-icon" src="./image/zhuzi.png" alt="竹子图标" />
            <h1 class="card-title">一只无聊的竹子</h1>
        </div>

        <div class="btn-group">
            <a href="./dl/" class="btn">进入空间</a>
            <a href="https://space.bilibili.com/3707020345608714" target="_blank" rel="noopener noreferrer" class="b-btn">B站主页</a>
        </div>
    </div>

    <script src="./theme.js"></script>
</body>
</html>
