<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>一只无聊的竹子</title>
    <link rel="stylesheet" href="./theme.css" />
    <style>
        /* ===== 主页专用样式 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            padding: 20px;
            transition: background 0.4s ease;

            /* ★ 动态渐变背景 ★ */
            background: linear-gradient(145deg, var(--bg-start), var(--bg-end));
            background-size: 300% 300%;
            animation: gradientFlow 12s ease-in-out infinite alternate;
        }

        /* 渐变流动动画 */
        @keyframes gradientFlow {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            max-width: 480px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 40px 35px 45px;
            box-shadow: 0 25px 50px -12px var(--card-shadow), inset 0 2px 4px rgba(255, 255, 255, 0.7), 0 0 0 1px var(--card-border);
            border: 1px solid var(--card-border);
            transition: transform 0.25s ease, box-shadow 0.3s ease, background 0.3s ease, border-color 0.3s ease;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 30px 60px -15px var(--card-shadow-hover), inset 0 2px 4px rgba(255, 255, 255, 0.7), 0 0 0 1px var(--card-border);
        }

        /* ★ 光晕 — 缓慢呼吸 ★ */
        .glow {
            position: absolute;
            top: -60%;
            left: -30%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(160, 210, 255, 0.15), transparent 70%);
            pointer-events: none;
            z-index: 0;
            transition: background 0.4s ease;
            animation: glowBreathe 6s ease-in-out infinite alternate;
        }

        @keyframes glowBreathe {
            0%   { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.15); opacity: 1; }
        }

        .card::before,
        .card::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            opacity: 0.4;
            pointer-events: none;
            z-index: -1;
            transition: background 0.4s ease, opacity 0.4s ease;
        }

        /* ★ 左上装饰圆点 — 缓慢漂浮 ★ */
        .card::before {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #8ec6f0, transparent 70%);
            top: -30px;
            right: -20px;
            animation: floatDot1 10s ease-in-out infinite alternate;
        }

        /* ★ 右下装饰圆点 — 缓慢漂浮（反向节奏） ★ */
        .card::after {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #b3d9f5, transparent 70%);
            bottom: -25px;
            left: -20px;
            animation: floatDot2 12s ease-in-out infinite alternate-reverse;
        }

        @keyframes floatDot1 {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-12px, 10px) scale(1.12); }
        }

        @keyframes floatDot2 {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(14px, -8px) scale(1.08); }
        }

        /* ---------- 深色模式覆盖 ---------- */
        @media (prefers-color-scheme: dark) {
            .glow {
                background: radial-gradient(circle at 30% 30%, rgba(60, 140, 220, 0.25), transparent 70%);
            }
            .card::before {
                background: radial-gradient(circle, #2a5a8a, transparent 70%);
                opacity: 0.5;
            }
            .card::after {
                background: radial-gradient(circle, #1a4a7a, transparent 70%);
                opacity: 0.5;
            }
        }

        body.dark .glow {
            background: radial-gradient(circle at 30% 30%, rgba(60, 140, 220, 0.25), transparent 70%);
        }
        body.dark .card::before {
            background: radial-gradient(circle, #2a5a8a, transparent 70%);
            opacity: 0.5;
        }
        body.dark .card::after {
            background: radial-gradient(circle, #1a4a7a, transparent 70%);
            opacity: 0.5;
        }

        .title-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 32px;
            position: relative;
            z-index: 1;
            padding-right: 48px;
        }

        .title-icon {
            width: 48px;
            height: 48px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(30, 120, 200, 0.25));
            flex-shrink: 0;
        }

        .card-title {
            font-size: 2.4rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(255, 255, 255, 0.6);
            margin: 0;
            line-height: 1.2;
            transition: color 0.3s ease;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            position: relative;
            z-index: 1;
        }

        .btn {
            display: block;
            width: 260px;
            padding: 14px 0;
            background: var(--btn-bg);
            color: #fff;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 60px;
            box-shadow: 0 8px 24px var(--btn-shadow), inset 0 2px 4px rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.25s ease;
            letter-spacing: 0.8px;
            cursor: pointer;
            text-align: center;
        }

        .btn:hover {
            box-shadow: 0 12px 32px var(--btn-shadow-hover), inset 0 2px 4px rgba(255, 255, 255, 0.4);
            transform: scale(1.02) translateY(-2px);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .b-btn {
            display: block;
            width: 220px;
            padding: 12px 0;
            background: linear-gradient(145deg, #5b9bd5, #3a7dc2);
            color: #fff;
            font-size: 1.05rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 60px;
            box-shadow: 0 6px 20px rgba(58, 125, 194, 0.35), inset 0 2px 4px rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: all 0.25s ease;
            letter-spacing: 0.6px;
            cursor: pointer;
            text-align: center;
        }

        .b-btn:hover {
            background: linear-gradient(145deg, #6ea8e0, #4685cc);
            box-shadow: 0 10px 28px rgba(58, 125, 194, 0.5), inset 0 2px 4px rgba(255, 255, 255, 0.3);
            transform: scale(1.02) translateY(-2px);
        }
        .b-btn:active {
            transform: scale(0.97);
        }

        /* 主题切换按钮 */
        .theme-toggle {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--back-btn-bg);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid var(--back-btn-border);
            box-shadow: 0 4px 12px rgba(43, 127, 199, 0.15);
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-primary);
        }

        .theme-toggle:hover {
            background: var(--toggle-hover);
            transform: scale(1.08);
        }

        .theme-toggle svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        @media (max-width: 480px) {
            .card { padding: 30px 20px 35px; border-radius: 30px; }
            .title-wrapper { gap: 10px; margin-bottom: 28px; padding-right: 40px; }
            .title-icon { width: 40px; height: 40px; }
            .card-title { font-size: 2rem; }
            .btn { width: 220px; font-size: 1rem; padding: 12px 0; }
            .b-btn { width: 190px; font-size: 0.95rem; padding: 10px 0; }
            .theme-toggle { top: 18px; right: 18px; width: 38px; height: 38px; }
            .theme-toggle svg { width: 20px; height: 20px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="glow"></div>

        <!-- 主题切换按钮 -->
        <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
            <svg viewBox="0 0 24 24" id="themeIcon">
                <path d="M12 3a9 9 0 1 0 9 9 9 9 0 0 0-9-9zm0 16a7 7 0 1 1 7-7 7 7 0 0 1-7 7z"/>
                <path d="M12 5v2M12 17v2M7.05 7.05l1.41 1.41M15.54 15.54l1.41 1.41M5 12h2M17 12h2M7.05 16.95l1.41-1.41M15.54 8.46l1.41-1.41"/>
            </svg>
        </button>

        <!-- 标题区 -->
        <div class="title-wrapper">
            <img class="title-icon" src="./image/zhuzi.png" alt="竹子图标" />
            <h1 class="card-title">一只无聊的竹子</h1>
        </div>

        <!-- 按钮组 -->
        <div class="btn-group">
            <a href="./dl/" class="btn">进入空间</a>
            <a href="https://space.bilibili.com/3707020345608714" target="_blank" rel="noopener noreferrer" class="b-btn">B站主页</a>
        </div>
    </div>

    <script src="./theme.js"></script>
</body>
</html>
